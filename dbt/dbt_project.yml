name: data_platform
version: '1.0.0'
config-version: 2

profile: data_platform

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  data_platform:
    staging:
      +materialized: view
    intermediate:
      +materialized: view
    marts:
      +materialized: incremental
      +on_schema_change: sync_all_columns
