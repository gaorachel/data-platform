version: 2

models:
  - name: int_gharchive__events_classified
    description: >
      PushEvents only, with each actor classified as 'bot' or 'human'.
      Classification uses actor_type = 'Bot' from the payload, with ILIKE fallbacks
      for common bot login patterns. Feeds the contributor_trends mart.
    columns:
      - name: event_date
        description: "Date of the push event (partition key from S3 path)."
        tests:
          - not_null

      - name: event_hour
        description: "Hour of the push event, 0–23."
        tests:
          - not_null

      - name: event_id
        description: "GitHub event ID."
        tests:
          - not_null

      - name: event_type
        description: "Always 'PushEvent' in this model."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['PushEvent']

      - name: created_at
        description: "Timestamp when the event was created."

      - name: actor_login
        description: "GitHub login of the actor."

      - name: actor_type
        description: "Actor type from the event payload (e.g. 'User', 'Bot')."

      - name: repo_name
        description: "Repository name in owner/repo format."

      - name: is_bot
        description: >
          TRUE when actor_type = 'Bot' OR actor_login matches bot patterns:
          %[bot]%, %-bot, %-ci, %-automation.
        tests:
          - not_null

      - name: contributor_type
        description: "'bot' if is_bot is TRUE, 'human' otherwise."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['human', 'bot']
