name: gh-analysis dbt weekly refresh

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  dbt-weekly-refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dbt/

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dbt
        run: pip install dbt-core==1.11.7 dbt-snowflake==1.11.3

      - name: Write profiles.yml
        run: |
          cat > profiles.yml <<EOF
          data_platform:
            target: prod
            outputs:
              prod:
                type: snowflake
                account: "${{ secrets.SNOWFLAKE_ACCOUNT }}"
                user: "${{ secrets.SNOWFLAKE_USER }}"
                password: "${{ secrets.SNOWFLAKE_PASSWORD }}"
                role: ACCOUNTADMIN
                database: DATA_PLATFORM
                warehouse: COMPUTE_WH
                schema: GHARCHIVE
                threads: 4
          EOF

      - name: dbt deps
        run: dbt deps

      - name: dbt build
        run: dbt build --select mart_language_activity
