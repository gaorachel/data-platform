name: gh-analysis CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, closed]

jobs:
  lightdash-deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dbt/

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dbt
        run: pip install dbt-core==1.11.7 dbt-snowflake==1.11.3

      - name: Install Lightdash CLI
        run: npm install -g @lightdash/cli@0.2746.2

      - name: Write Snowflake private key
        env:
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
        run: |
          echo "$SNOWFLAKE_PRIVATE_KEY" > /tmp/snowflake_rsa_key.p8
          chmod 600 /tmp/snowflake_rsa_key.p8

      - name: Write profiles.yml
        run: |
          cat > profiles.yml <<EOF
          data_platform:
            target: prod
            outputs:
              prod:
                type: snowflake
                account: "${{ secrets.SNOWFLAKE_ACCOUNT }}"
                user: "${{ secrets.SNOWFLAKE_USER }}"
                private_key_path: "/tmp/snowflake_rsa_key.p8"
                role: ACCOUNTADMIN
                database: DATA_PLATFORM
                warehouse: COMPUTE_WH
                schema: GHARCHIVE
                threads: 4
          EOF

      - name: dbt deps
        run: dbt deps --profiles-dir .

      - name: lightdash login
        run: lightdash login https://eu1.lightdash.cloud --token "${{ secrets.LIGHTDASH_API_KEY }}"

      - name: lightdash deploy
        if: github.event_name == 'push'
        env:
          LIGHTDASH_PROJECT_UUID: 3f159052-6c8d-44e5-86d7-2a8592a503c5
        run: lightdash deploy --profiles-dir .

      - name: lightdash start-preview
        if: github.event_name == 'pull_request'
        env:
          LIGHTDASH_PROJECT_UUID: 3f159052-6c8d-44e5-86d7-2a8592a503c5
        run: lightdash start-preview --name "PR-${{ github.event.number }}" --profiles-dir .

  lightdash-stop-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Lightdash CLI
        run: npm install -g @lightdash/cli@0.2746.2

      - name: lightdash login
        run: lightdash login https://eu1.lightdash.cloud --token "${{ secrets.LIGHTDASH_API_KEY }}"

      - name: lightdash stop-preview
        env:
          LIGHTDASH_PROJECT_UUID: 3f159052-6c8d-44e5-86d7-2a8592a503c5
        run: lightdash stop-preview --name "PR-${{ github.event.number }}"
